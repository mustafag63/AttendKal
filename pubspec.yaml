name: attendkal
description: A Flutter application for student attendance tracking with course management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Network & API
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.5
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # Network & HTTP
  dio: ^5.7.0
  http: ^1.2.2
  
  # State Management
  equatable: ^2.0.5
  flutter_bloc: ^9.1.1
  
  # Notifications (Local only)
  flutter_local_notifications: ^19.4.0
  
  # UI & Navigation
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  
  # Dependency Injection
  get_it: ^8.0.0
  
  # Navigation
  go_router: ^16.1.0
  
  # Utils
  intl: ^0.20.2
  json_annotation: ^4.9.0
  
  # Local Storage
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  
  # Date & Time
  table_calendar: ^3.2.0
  
  # Notifications
  timezone: ^0.10.1
  
  # Utils
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  build_runner: ^2.6.0
  flutter_lints: ^6.0.0
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/ 