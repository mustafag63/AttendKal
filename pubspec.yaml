name: attendkal
description: A Flutter application for student attendance tracking with course management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Icons
  cupertino_icons: ^1.0.2
  
  # State Management
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  
  # UI & Navigation
  cached_network_image: ^3.2.3
  flutter_screenutil: ^5.8.4
  flutter_svg: ^2.0.7
  go_router: ^10.1.2
  
  # Local Storage
  path: ^1.8.3
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # Firebase
  cloud_firestore: ^4.13.6
  firebase_auth: ^4.15.3
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # Network & API
  connectivity_plus: ^4.0.2
  dio: ^5.3.0
  
  # Notifications
  flutter_local_notifications: ^15.1.0+1
  timezone: ^0.9.2
  
  # Utils
  intl: ^0.18.1
  json_annotation: ^4.8.1
  uuid: ^3.0.7
  
  # Date & Time
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  build_runner: ^2.4.6
  flutter_lints: ^2.0.0
  json_serializable: ^6.7.1
  mockito: ^5.4.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/ 