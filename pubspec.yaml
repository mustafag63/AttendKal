name: attendkal
description: A Flutter application for student attendance tracking with course management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  equatable: ^2.0.5
  flutter_bloc: ^8.1.6
  get_it: ^8.0.0
  
  # UI & Navigation
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  go_router: ^14.2.3
  
  # Local Storage
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  
  # Firebase
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  
  # Network & API
  connectivity_plus: ^6.0.5
  dio: ^5.7.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  
  # Utils
  intl: ^0.19.0
  json_annotation: ^4.9.0
  uuid: ^4.5.0
  
  # Date & Time
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/ 