name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: attendkal_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: backend
      run: npm ci

    - name: Setup environment variables
      working-directory: backend
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/attendkal_test" >> .env
        echo "REDIS_HOST=localhost" >> .env
        echo "REDIS_PORT=6379" >> .env
        echo "JWT_SECRET=test-jwt-secret-key-for-ci-cd-pipeline" >> .env
        echo "JWT_REFRESH_SECRET=test-refresh-secret-key-for-ci-cd" >> .env
        echo "NODE_ENV=test" >> .env
        # Set maintenance mode to false for testing
        echo "SUBSCRIPTION_MAINTENANCE=false" >> .env
        echo "SUBSCRIPTION_ENABLED=true" >> .env

    - name: Generate Prisma client
      working-directory: backend
      run: npm run db:generate

    - name: Run database migrations
      working-directory: backend
      run: npm run db:push

    - name: Run linting
      working-directory: backend
      run: npm run lint

    - name: Run tests with feature flags
      working-directory: backend
      run: |
        # Run tests with subscription enabled
        npm test
        
        # Test maintenance mode behavior
        echo "SUBSCRIPTION_MAINTENANCE=true" >> .env
        npm test -- --testNamePattern="maintenance|503" || echo "Maintenance tests completed"

    - name: Run test coverage
      working-directory: backend
      run: npm run test:coverage

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        directory: backend/coverage
        flags: backend
        name: backend-coverage

  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: backend
      run: npm ci

    - name: Check code formatting
      working-directory: backend
      run: |
        npm run format
        git diff --exit-code || (echo "Code formatting issues found. Run 'npm run format' to fix." && exit 1)

    - name: Run ESLint
      working-directory: backend
      run: npm run lint

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: backend
      run: npm ci

    - name: Run security audit
      working-directory: backend
      run: npm audit --audit-level=moderate

    - name: Check for vulnerabilities
      working-directory: backend
      run: npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    needs: [test, lint-and-format]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: backend
      run: npm ci

    - name: Build application
      working-directory: backend
      run: |
        # Create production build artifacts
        mkdir -p dist
        cp -r src dist/
        cp package*.json dist/
        cp prisma dist/

    - name: Test Docker build
      working-directory: backend
      run: |
        docker build -t attendkal-backend:test .
        docker run --rm attendkal-backend:test node --version 