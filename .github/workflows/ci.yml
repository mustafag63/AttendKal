name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: attendkal
          POSTGRES_PASSWORD: attendkal
          POSTGRES_DB: attendkal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U attendkal -d attendkal"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Backend env
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          PORT=3000
          DATABASE_URL=postgresql://attendkal:attendkal@localhost:5432/attendkal?schema=public
          JWT_SECRET=ci-secret
          JWT_REFRESH_SECRET=ci-refresh
          JWT_EXPIRE=7d
          JWT_REFRESH_EXPIRE=30d
          CORS_ORIGIN=http://localhost:3001,http://127.0.0.1:3001
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX_REQUESTS=100
          LOG_LEVEL=info
          EOF

      - name: Prisma generate
        working-directory: backend
        run: pnpm prisma:gen

      - name: Prisma migrate deploy
        working-directory: backend
        run: pnpm prisma:migrate:deploy

      - name: Backend tests
        working-directory: backend
        run: pnpm test --if-present

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build steps (web/mobile) go here"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - run: echo "Deploy to staging (run prisma migrate deploy in your pipeline)"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Deploy to production (run prisma migrate deploy in your pipeline)" 