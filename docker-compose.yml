version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: attendkal-postgres
    environment:
      POSTGRES_USER: attendkal
      POSTGRES_PASSWORD: attendkal
      POSTGRES_DB: attendkal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U attendkal -d attendkal" ]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  pgdata:
