apiVersion: v1
kind: ConfigMap
metadata:
  name: attendkal-config
  namespace: attendkal
data:
  NODE_ENV: "production"
  PORT: "3000"
  CORS_ORIGIN: "https://app.attendkal.com"
  JWT_EXPIRE: "7d"
  JWT_REFRESH_EXPIRE: "30d"
  BCRYPT_ROUNDS: "12"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  LOG_LEVEL: "info"
  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: attendkal
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'attendkal-api'
        static_configs:
          - targets: ['attendkal-api:3000']
        metrics_path: '/metrics'
        scrape_interval: 10s
        
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090'] 